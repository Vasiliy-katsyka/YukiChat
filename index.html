<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1120" id="meta-theme-color">
    <title>YukiChat Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
        :root {
            --bg-base: #0b1120; --bg-panel: rgba(15, 23, 42, 0.75); --bg-input: rgba(0, 0, 0, 0.4);
            --bg-hover: rgba(255, 255, 255, 0.08); --border-color: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6; --primary-hover: #2563eb; --text-main: #f8fafc; --text-muted: #94a3b8;
            --msg-sent: #2563eb; --msg-received: #1e293b; --danger: #ef4444; --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --wallpaper: none; --blur-val: blur(20px); --radius: 18px;
        }

        [data-theme="light"] {
            --bg-base: #f0f4f8; --bg-panel: rgba(255, 255, 255, 0.85); --bg-input: rgba(255, 255, 255, 1);
            --bg-hover: rgba(0, 0, 0, 0.05); --border-color: rgba(0, 0, 0, 0.1);
            --primary: #0ea5e9; --text-main: #0f172a; --text-muted: #64748b;
            --msg-sent: #0ea5e9; --msg-received: #ffffff; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }[data-theme="oled"] {
            --bg-base: #000; --bg-panel: #000; --bg-input: #111;
            --border-color: #222; --primary: #8b5cf6; --msg-received: #111;
        }
    
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-main);
            height: 100dvh; width: 100vw; overflow: hidden; display: flex;
            background-image: var(--wallpaper); background-size: cover; background-position: center;
        }
    
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    
        .glass { background: var(--bg-panel); backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val); border: 1px solid var(--border-color); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: var(--bg-input); flex-shrink: 0; }
        
        .btn { padding: 12px; border: none; border-radius: 12px; background: var(--primary); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; justify-content: center; gap: 8px; }
        .btn:hover { background: var(--primary-hover); }
        .input-field { width: 100%; padding: 14px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 12px; outline: none; font-family: inherit; }
    
        /* Layout */
        #auth-container { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; background: var(--bg-base); }
        .auth-box { padding: 30px; border-radius: 24px; width: 90%; max-width: 360px; text-align: center; }
        .auth-box input { margin-bottom: 12px; }
        
        #app-container { display: none; width: 100%; height: 100%; max-width: 1400px; margin: 0 auto; }
        .chat-layout { display: flex; width: 100%; height: 100%; position: relative; }
    
        /* Sidebar */
        .sidebar { width: 340px; flex-shrink: 0; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-panel); z-index: 10; }
        .sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .search-container { padding: 10px 16px; display: flex; gap: 8px; }
        .list-container { flex: 1; overflow-y: auto; padding: 8px; }
        
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 14px; cursor: pointer; transition: 0.2s; margin-bottom: 2px; }
        .user-item:hover { background: var(--bg-hover); }
        .user-item.active { background: var(--primary); color: #fff; }
        .user-item-info { flex: 1; overflow: hidden; }
        .user-name { font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; }
        .user-last-msg { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-item.active .user-last-msg { color: rgba(255,255,255,0.8); }
        .unread-badge { background: var(--danger); color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .online-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; border: 2px solid var(--bg-panel); position: absolute; margin-top: 30px; margin-left: 30px; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: transparent; }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-panel); backdrop-filter: var(--blur-val); z-index: 5; }
        .back-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; }
        
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; width: fit-content; align-items: flex-end; position: relative; }
        .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.received { align-self: flex-start; }
        .msg-row .avatar { width: 24px; height: 24px; }
        
        .msg-bubble { padding: 10px 14px; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); user-select: text; }
        .msg-row.sent .msg-bubble { background: var(--msg-sent); color: #fff; border-radius: var(--radius) var(--radius) 4px var(--radius); }
        .msg-row.received .msg-bubble { background: var(--msg-received); border-radius: var(--radius) var(--radius) var(--radius) 4px; }
        
        /* Message Extras */
        .msg-bubble img, .msg-bubble video { max-width: 100%; max-height: 250px; border-radius: 8px; cursor: zoom-in; }
        .msg-bubble audio { max-width: 200px; height: 30px; }
        .blur-media { filter: blur(15px); transition: 0.3s; }
        .blur-media:active { filter: blur(0); }
        
        .msg-meta { font-size: 11px; opacity: 0.7; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; align-items: center; }
        .msg-row.received .msg-meta { justify-content: flex-start; }
        .reactions-bar { position: absolute; bottom: -12px; right: 10px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 2px 6px; font-size: 12px; display: flex; gap: 4px; box-shadow: var(--shadow); }
        
        /* Markdown */
        .md-bold { font-weight: bold; } .md-italic { font-style: italic; } .md-code { background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; font-family: monospace; } .md-link { color: inherit; text-decoration: underline; }
        
        /* Input Area */
        .input-area { padding: 10px 16px; background: var(--bg-panel); border-top: 1px solid var(--border-color); display: flex; gap: 8px; align-items: flex-end; }
        .msg-input { flex: 1; resize: none; min-height: 44px; max-height: 120px; border-radius: 22px; padding: 12px 16px; background: var(--bg-input); }
        .msg-input::-webkit-scrollbar { display: none; }
        .icon-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; color: var(--text-muted); border: none; font-size: 20px; transition: 0.2s; }
        .icon-btn:hover { color: var(--primary); background: var(--bg-hover); }
        .recording { color: var(--danger); animation: pulse 1s infinite; }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, var(--bg-input) 25%, var(--bg-hover) 50%, var(--bg-input) 75%); background-size: 200% 100%; animation: load 1.5s infinite; border-radius: 8px; height: 20px; margin-bottom: 8px; }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        /* Modals & Menus */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; }
        .modal-card { background: var(--bg-base); padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border-color); max-height: 90vh; overflow-y: auto; }
        .ctx-menu { display: none; position: fixed; background: var(--bg-panel); backdrop-filter: var(--blur-val); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow); z-index: 200; overflow: hidden; min-width: 160px; }
        .ctx-item { padding: 12px 16px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-main); background: none; border: none; width: 100%; text-align: left; }
        .ctx-item:hover { background: var(--bg-hover); }
        .emoji-bar { display: flex; padding: 8px; gap: 8px; border-bottom: 1px solid var(--border-color); background: var(--bg-input); }
        .emoji-btn { background: none; border: none; font-size: 20px; cursor: pointer; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; display: none; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; border: none; transition: 0.3s; }
            .chat-area { width: 100%; height: 100%; position: absolute; transform: translateX(100%); transition: 0.3s; }
            .show-chat .sidebar { transform: translateX(-30%); opacity: 0; pointer-events: none; }
            .show-chat .chat-area { transform: translateX(0); }
            .back-btn { display: block; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <!-- Auth Screen -->
    <div id="auth-container">
        <div class="auth-box glass">
            <h1 style="margin-bottom: 8px;">YukiChat <span style="color:var(--primary)">Pro</span></h1>
            <p style="color:var(--text-muted); font-size: 14px; margin-bottom: 24px;">No card. Full privacy.</p>
            <input type="text" id="auth-user" class="input-field" placeholder="Username" autocomplete="off">
            <input type="password" id="auth-pass" class="input-field" placeholder="Password">
            <button class="btn" style="width: 100%;" onclick="App.auth(true)" id="btn-login">Login</button>
            <button class="btn" style="width: 100%; background: transparent; color: var(--primary); margin-top: 8px;" onclick="App.auth(false)">Create Account</button>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-container">
        <div class="chat-layout glass" id="layout">
            
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <img src="" id="my-avatar" class="avatar" style="cursor:pointer" onclick="UI.openModal('settings-modal')">
                    <button class="icon-btn" onclick="UI.openModal('new-chat-modal')">✏️</button>
                </div>
                <div class="search-container">
                    <input type="text" id="search-input" class="input-field" style="padding: 8px 12px; border-radius: 8px;" placeholder="Search chats or users..." oninput="App.search(this.value)">
                </div>
                <div id="chat-list" class="list-container">
                    <!-- Skeletons initially -->
                    <div class="user-item"><div class="avatar skeleton"></div><div style="flex:1"><div class="skeleton" style="width: 50%"></div><div class="skeleton"></div></div></div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div id="empty-state" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-muted);">
                    <h2>Select a chat</h2><p>Or create a new one</p>
                </div>
                
                <div id="active-chat" style="display:none; height:100%; flex-direction:column;">
                    <div class="chat-header">
                        <button class="back-btn" onclick="UI.closeChat()">←</button>
                        <img src="" id="chat-avatar" class="avatar" style="cursor:pointer" onclick="UI.openModal('profile-modal')">
                        <div style="flex:1; cursor:pointer" onclick="UI.openModal('profile-modal')">
                            <div style="font-weight:600" id="chat-title">Chat</div>
                            <div style="font-size:12px; color:var(--text-muted)" id="chat-status">online</div>
                        </div>
                    </div>
                    
                    <div class="messages" id="msgs"></div>
                    
                    <div id="reply-bar" style="display:none; padding:8px 16px; background:var(--bg-panel); border-top:1px solid var(--border-color); font-size:13px; color:var(--text-muted); align-items:center; justify-content:space-between;">
                        <div>Replying to: <b id="reply-text" style="color:var(--text-main)">...</b></div>
                        <span style="cursor:pointer" onclick="App.cancelAction()">✕</span>
                    </div>

                    <div class="input-area">
                        <label class="icon-btn">📎<input type="file" style="display:none" onchange="App.sendFile(event)"></label>
                        <textarea id="msg-input" class="input-field msg-input" placeholder="Message..." rows="1" onkeydown="App.handleInput(event)"></textarea>
                        <button class="icon-btn" id="mic-btn" onclick="App.toggleAudio()">🎤</button>
                        <button class="icon-btn" style="color:var(--primary); display:none;" id="send-btn" onclick="App.sendText()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="settings-modal" onclick="if(event.target===this) UI.closeModal('settings-modal')">
        <div class="modal-card">
            <h2 style="margin-bottom: 20px;">Settings</h2>
            <div style="text-align:center; margin-bottom: 20px;">
                <label style="cursor:pointer">
                    <img src="" id="set-avatar" class="avatar" style="width:80px; height:80px; margin-bottom:8px">
                    <input type="file" style="display:none" accept="image/*" onchange="App.updateProfile(event, 'avatar')">
                </label>
                <input type="text" id="set-bio" class="input-field" placeholder="Add a bio..." onblur="App.updateProfile(null, 'bio')" style="text-align:center">
            </div>
            
            <div class="setting-row">
                <span>Theme</span>
                <select id="theme-sel" class="input-field" style="width:auto; padding:6px" onchange="UI.setTheme(this.value)">
                    <option value="dark">Dark</option><option value="light">Light</option><option value="oled">OLED</option>
                </select>
            </div>
            <div class="setting-row">
                <span>Wallpaper (URL or base64)</span>
                <input type="text" id="wall-sel" class="input-field" style="width:120px; padding:6px" placeholder="URL..." onblur="UI.setWall(this.value)">
            </div>
            <div class="setting-row">
                <span>Bubble Radius</span>
                <input type="range" min="4" max="24" value="18" oninput="document.documentElement.style.setProperty('--radius', this.value+'px')">
            </div>
            <div class="setting-row">
                <button class="btn" style="width:100%; background:transparent; color:var(--text-main); border:1px solid var(--border-color)" onclick="App.manageSessions()">📱 Active Sessions</button>
            </div>
            <button class="btn" style="width:100%; background:var(--danger); margin-top:20px" onclick="App.logout()">Logout</button>
        </div>
    </div>

    <div class="modal" id="new-chat-modal" onclick="if(event.target===this) UI.closeModal('new-chat-modal')">
        <div class="modal-card">
            <h3>New Chat / Group</h3>
            <input type="text" id="nc-name" class="input-field" placeholder="Group Name (leave blank for DM)" style="margin: 16px 0;">
            <div id="nc-users" style="max-height:200px; overflow-y:auto"></div>
        </div>
    </div>

    <div class="modal" id="profile-modal" onclick="if(event.target===this) UI.closeModal('profile-modal')">
        <div class="modal-card" style="text-align:center">
            <img src="" id="prof-avatar" class="avatar" style="width:100px; height:100px; margin-bottom:10px">
            <h2 id="prof-name">Name</h2>
            <p id="prof-bio" style="color:var(--text-muted); margin-bottom:16px"></p>
            <input type="text" id="prof-nick" class="input-field" placeholder="Set local nickname..." onblur="App.setNickname(this.value)">
        </div>
    </div>

    <!-- Context Menu -->
    <div class="ctx-menu" id="ctx">
        <div class="emoji-bar" id="ctx-emojis">
            <span class="emoji-btn" onclick="App.msgAction('react', '👍')">👍</span>
            <span class="emoji-btn" onclick="App.msgAction('react', '❤️')">❤️</span>
            <span class="emoji-btn" onclick="App.msgAction('react', '😂')">😂</span>
            <span class="emoji-btn" onclick="App.msgAction('react', '🔥')">🔥</span>
        </div>
        <button class="ctx-item" onclick="App.prepReply()">↩ Reply</button>
        <button class="ctx-item" onclick="App.prepEdit()" id="ctx-edit">✎ Edit</button>
        <button class="ctx-item" onclick="App.msgAction('pin')">📌 Pin</button>
        <button class="ctx-item" onclick="navigator.clipboard.writeText(App.targetMsgText); UI.toast('Copied')">📋 Copy</button>
        <button class="ctx-item" style="color:var(--danger)" onclick="App.msgAction('delete')" id="ctx-del">🗑 Delete</button>
    </div>

    <script>
        // --- CONSTANTS & STATE ---
        const API = 'https://yukichat.kviappsgames.workers.dev'; // Replace with your Worker URL
        const DEF_AV = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzllOWU5ZSI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDQgMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==";
        
        const State = {
            token: localStorage.getItem('y_t'), user: JSON.parse(localStorage.getItem('y_u')||'{}'),
            chats: new Map(), msgs: new Map(), nicks: JSON.parse(localStorage.getItem('y_n')||'{}'),
            activeChat: null, pollTimer: null, targetMsgId: null, targetMsgText: '', actionType: null,
            mediaRecorder: null, audioChunks:[]
        };

        // --- PWA SETUP ---
        const manifest = { name: "YukiChat Pro", short_name: "Yuki", display: "standalone", background_color: "#0b1120", theme_color: "#0b1120", icons:[{src: DEF_AV, sizes: "192x192", type: "image/svg+xml"}] };
        const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
        document.head.appendChild(Object.assign(document.createElement("link"), {rel: "manifest", href: URL.createObjectURL(blob)}));

        // --- CORE API ---
        const req = async (path, method='GET', body=null) => {
            const opt = { method, headers: {} };
            if(State.token) opt.headers['Authorization'] = `Bearer ${State.token}`;
            if(body) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
            const res = await fetch(API + path, opt);
            if(res.status === 401) App.logout();
            const d = await res.json();
            if(!res.ok) throw new Error(d.error);
            return d;
        };

        // --- PARSERS ---
        const md = t => t.replace(/</g,'&lt;').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="md-link">$1</a>')
                         .replace(/\*(.*?)\*/g, '<span class="md-bold">$1</span>').replace(/_(.*?)_/g, '<span class="md-italic">$1</span>')
                         .replace(/`(.*?)`/g, '<span class="md-code">$1</span>');
        const getNick = (id, name) => State.nicks[id] || name;

        // --- UI CONTROLLER ---
        const UI = {
            init() {
                this.setTheme(localStorage.getItem('y_th')||'dark');
                this.setWall(localStorage.getItem('y_w')||'');
                if(State.token) { App.start(); }
                
                document.addEventListener('click', e => { if(!e.target.closest('#ctx') && !e.target.closest('.msg-bubble')) document.getElementById('ctx').style.display='none'; });
                
                // Input toggle logic
                document.getElementById('msg-input').addEventListener('input', e => {
                    const v = e.target.value.trim();
                    document.getElementById('mic-btn').style.display = v ? 'none' : 'flex';
                    document.getElementById('send-btn').style.display = v ? 'flex' : 'none';
                });
            },
            setTheme(t) { localStorage.setItem('y_th', t); document.documentElement.setAttribute('data-theme', t); document.getElementById('theme-sel').value=t; },
            setWall(w) { localStorage.setItem('y_w', w); document.documentElement.style.setProperty('--wallpaper', w ? `url(${w})` : 'none'); document.getElementById('wall-sel').value=w; },
            toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); },
            openModal(id) { document.getElementById(id).style.display='flex'; },
            closeModal(id) { document.getElementById(id).style.display='none'; },
            closeChat() { document.getElementById('layout').classList.remove('show-chat'); State.activeChat=null; clearInterval(State.pollTimer); },
            showCtx(e, id, isMine, txt) {
                e.preventDefault(); State.targetMsgId = id; State.targetMsgText = txt;
                const m = document.getElementById('ctx');
                m.style.display = 'block'; m.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px'; m.style.top = Math.min(e.clientY, window.innerHeight - 200) + 'px';
                document.getElementById('ctx-edit').style.display = isMine ? 'flex' : 'none';
                document.getElementById('ctx-del').style.display = isMine ? 'flex' : 'none';
            }
        };

        // --- MAIN LOGIC ---
        const App = {
            async auth(isLogin) {
                const u = document.getElementById('auth-user').value.trim();
                const p = document.getElementById('auth-pass').value.trim();
                if(!u || !p) return UI.toast('Fill fields');
                try {
                    const d = await req(`/api/${isLogin ? 'login' : 'register'}`, 'POST', {username:u, password:p, device: navigator.userAgent});
                    State.token = d.token; State.user = d; 
                    localStorage.setItem('y_t', d.token); localStorage.setItem('y_u', JSON.stringify(d));
                    this.start();
                } catch(e) { UI.toast(e.message); }
            },
            
            logout() { localStorage.clear(); location.reload(); },

            start() {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('my-avatar').src = State.user.avatar || DEF_AV;
                document.getElementById('set-avatar').src = State.user.avatar || DEF_AV;
                document.getElementById('set-bio').value = State.user.bio || '';
                this.loadChats();
                setInterval(() => this.loadChats(), 5000); // Background poll
            },

            async loadChats() {
                try {
                    const chats = await req('/api/chats');
                    const cList = document.getElementById('chat-list');
                    cList.innerHTML = '';
                    chats.forEach(c => {
                        State.chats.set(c.id, c);
                        const isDM = c.type === 'dm';
                        const name = isDM ? getNick(c.dm_username, c.dm_username) : c.name;
                        const av = isDM ? (c.dm_avatar||DEF_AV) : (c.avatar||DEF_AV);
                        const online = isDM && c.dm_last_seen && (new Date() - new Date(c.dm_last_seen) < 120000) ? '<div class="online-dot"></div>' : '';
                        
                        let msgTxt = c.last_msg_type === 'photo' ? '📷 Photo' : (c.last_msg_type === 'audio' ? '🎤 Voice' : (c.last_msg || 'New chat'));
                        if(c.type === 'saved') msgTxt = c.last_msg || 'Saved notes';

                        cList.innerHTML += `
                            <div class="user-item ${State.activeChat===c.id?'active':''}" onclick="App.openChat(${c.id})">
                                <div style="position:relative"><img src="${av}" class="avatar">${online}</div>
                                <div class="user-item-info">
                                    <div class="user-name"><span>${name}</span> ${c.unread>0 ? `<span class="unread-badge">${c.unread}</span>`:''}</div>
                                    <div class="user-last-msg">${msgTxt}</div>
                                </div>
                            </div>
                        `;
                    });
                } catch(e){}
            },

            async search(q) {
                if(!q) return this.loadChats();
                try {
                    const u = await req(`/api/users/search?q=${q}`);
                    const cList = document.getElementById('chat-list'); cList.innerHTML = '';
                    u.forEach(user => {
                        cList.innerHTML += `
                            <div class="user-item" onclick="App.startDM(${user.id}, '${user.username}')">
                                <img src="${user.avatar||DEF_AV}" class="avatar">
                                <div class="user-item-info"><div class="user-name">${getNick(user.username, user.username)}</div><div class="user-last-msg">${user.bio||'Say hi!'}</div></div>
                            </div>
                        `;
                    });
                } catch(e){}
            },

            async startDM(id, name) {
                try {
                    const d = await req('/api/chats', 'POST', {type:'dm', target_user_id: id});
                    this.openChat(d.chat_id);
                } catch(e){ UI.toast('Failed'); }
            },

            openChat(id) {
                State.activeChat = id; const c = State.chats.get(id);
                document.getElementById('layout').classList.add('show-chat');
                document.getElementById('empty-state').style.display='none';
                document.getElementById('active-chat').style.display='flex';
                
                const isDM = c.type === 'dm';
                document.getElementById('chat-title').textContent = isDM ? getNick(c.dm_username, c.dm_username) : c.name;
                document.getElementById('chat-avatar').src = isDM ? (c.dm_avatar||DEF_AV) : (c.avatar||DEF_AV);
                document.getElementById('chat-status').textContent = c.type === 'saved' ? 'Notes' : (isDM ? (c.dm_last_seen ? 'seen recently' : 'offline') : 'Group');
                
                // Profile Modal Data
                document.getElementById('prof-avatar').src = document.getElementById('chat-avatar').src;
                document.getElementById('prof-name').textContent = document.getElementById('chat-title').textContent;
                document.getElementById('prof-nick').value = State.nicks[c.dm_username] || '';
                
                this.loadMsgs();
                clearInterval(State.pollTimer);
                State.pollTimer = setInterval(()=>this.loadMsgs(), 3000);
            },

            async loadMsgs() {
                if(!State.activeChat) return;
                try {
                    const msgs = await req(`/api/messages/${State.activeChat}`);
                    const cont = document.getElementById('msgs');
                    const isBtm = cont.scrollHeight - cont.scrollTop <= cont.clientHeight + 50;
                    
                    cont.innerHTML = ''; State.msgs.clear();
                    msgs.forEach(m => {
                        State.msgs.set(m.id, m);
                        const isMine = m.sender_id === State.user.userId;
                        let inner = '';
                        
                        // Reply
                        if(m.reply_to_id) {
                            const rm = msgs.find(x=>x.id === m.reply_to_id);
                            const rt = rm ? (rm.type!=='text' ? 'Media' : rm.content) : '...';
                            inner += `<div style="font-size:12px; border-left:2px solid; padding-left:4px; margin-bottom:4px; opacity:0.8">${rt}</div>`;
                        }

                        // Content
                        if(m.type === 'photo') inner += `<img src="${m.content}" ${m.expires_at ? 'class="blur-media"' : ''}>`;
                        else if(m.type === 'audio') inner += `<audio controls src="${m.content}"></audio>`;
                        else inner += md(m.content);

                        // Reactions & Meta
                        let rxHtml = ''; const rxs = JSON.parse(m.reactions||'{}');
                        for(let k in rxs) rxHtml += rxs[k];
                        if(rxHtml) inner += `<div class="reactions-bar">${rxHtml}</div>`;
                        
                        const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        const ticks = isMine ? (m.is_read ? '<span style="color:#34d399">✓✓</span>' : '✓') : '';
                        const edit = m.edited_at ? '✎ ' : '';
                        const pin = m.is_pinned ? '📌 ' : '';

                        inner += `<div class="msg-meta">${pin}${edit}${time} ${ticks}</div>`;

                        cont.innerHTML += `
                            <div class="msg-row ${isMine?'sent':'received'}" id="m${m.id}">
                                ${!isMine && State.chats.get(State.activeChat).type!=='dm' ? `<img src="${m.sender_avatar||DEF_AV}" class="avatar" style="width:20px;height:20px">` : ''}
                                <div class="msg-bubble" oncontextmenu="UI.showCtx(event, ${m.id}, ${isMine}, '${m.type==='text'?m.content.replace(/'/g,"\\'"):''}')">${inner}</div>
                            </div>
                        `;
                    });
                    if(isBtm) cont.scrollTop = cont.scrollHeight;
                } catch(e){}
            },

            // Inputs & Actions
            handleInput(e) { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); this.sendText(); } },
            
            async sendText() {
                const inp = document.getElementById('msg-input');
                let txt = inp.value.trim();
                if(!txt || !State.activeChat) return;
                inp.value = ''; inp.dispatchEvent(new Event('input')); // reset layout
                
                try {
                    if(State.actionType === 'edit') {
                        await req(`/api/messages/${State.targetMsgId}/action`, 'POST', {action:'edit', text:txt});
                    } else {
                        // Secret Self-Destruct trigger (Start with /time photo)
                        let exp = 0; if(txt.startsWith('/time ')) { exp = parseInt(txt.split(' ')[1]); txt = txt.split(' ').slice(2).join(' '); }
                        await req(`/api/messages/${State.activeChat}`, 'POST', {content:txt, type:'text', reply_to_id: State.actionType==='reply'?State.targetMsgId:null, expires_in:exp});
                    }
                    this.cancelAction(); this.loadMsgs();
                } catch(e) { UI.toast('Send failed'); }
            },

            sendFile(e) {
                const f = e.target.files[0]; if(!f) return;
                if(f.size > 1000000) return UI.toast('File too large (Max 1MB)'); // D1 limit safety
                const r = new FileReader();
                r.onload = async ev => {
                    try { await req(`/api/messages/${State.activeChat}`, 'POST', {content:ev.target.result, type: f.type.startsWith('image')?'photo':'file'}); this.loadMsgs(); }
                    catch(e){ UI.toast('Upload failed'); }
                };
                r.readAsDataURL(f);
            },

            async toggleAudio() {
                if(!State.mediaRecorder) {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({audio:true});
                        State.mediaRecorder = new MediaRecorder(s);
                        State.mediaRecorder.ondataavailable = e => State.audioChunks.push(e.data);
                        State.mediaRecorder.onstop = () => {
                            const b = new Blob(State.audioChunks, {type:'audio/webm'});
                            const r = new FileReader();
                            r.onload = async ev => { await req(`/api/messages/${State.activeChat}`, 'POST', {content:ev.target.result, type:'audio'}); this.loadMsgs(); };
                            r.readAsDataURL(b);
                            State.audioChunks =[]; State.mediaRecorder = null;
                        };
                        State.mediaRecorder.start();
                        document.getElementById('mic-btn').classList.add('recording');
                        document.getElementById('msg-input').placeholder = "Recording... tap mic to send";
                    } catch(e) { UI.toast('Mic denied'); }
                } else {
                    State.mediaRecorder.stop();
                    document.getElementById('mic-btn').classList.remove('recording');
                    document.getElementById('msg-input').placeholder = "Message...";
                }
            },

            prepReply() { State.actionType='reply'; document.getElementById('reply-text').textContent = State.targetMsgText; document.getElementById('reply-bar').style.display='flex'; document.getElementById('ctx').style.display='none'; document.getElementById('msg-input').focus(); },
            prepEdit() { State.actionType='edit'; document.getElementById('msg-input').value = State.targetMsgText; document.getElementById('ctx').style.display='none'; document.getElementById('msg-input').focus(); document.getElementById('msg-input').dispatchEvent(new Event('input')); },
            cancelAction() { State.actionType=null; State.targetMsgId=null; document.getElementById('reply-bar').style.display='none'; document.getElementById('msg-input').value=''; document.getElementById('msg-input').dispatchEvent(new Event('input')); },

            async msgAction(act, emoji=null) {
                try {
                    await req(`/api/messages/${State.targetMsgId}/action`, 'POST', {action:act, emoji});
                    document.getElementById('ctx').style.display='none'; this.loadMsgs();
                } catch(e) { UI.toast('Action failed'); }
            },

            // Profile & Settings
            updateProfile(e, type) {
                if(type === 'avatar') {
                    const f = e.target.files[0]; if(!f) return;
                    const r = new FileReader();
                    r.onload = async ev => {
                        const img = new Image(); img.onload = async () => {
                            const canvas = document.createElement('canvas'); canvas.width=150; canvas.height=150;
                            const ctx = canvas.getContext('2d');
                            const scale = Math.max(150/img.width, 150/img.height);
                            ctx.drawImage(img, (150 - img.width*scale)/2, (150 - img.height*scale)/2, img.width*scale, img.height*scale);
                            const b64 = canvas.toDataURL('image/jpeg', 0.8);
                            await req('/api/user/profile', 'PUT', {avatar: b64});
                            document.getElementById('set-avatar').src = b64; document.getElementById('my-avatar').src = b64;
                            State.user.avatar = b64; localStorage.setItem('y_u', JSON.stringify(State.user));
                        }; img.src = ev.target.result;
                    }; r.readAsDataURL(f);
                } else if(type === 'bio') {
                    const bio = document.getElementById('set-bio').value;
                    req('/api/user/profile', 'PUT', {bio});
                }
            },

            setNickname(nick) {
                const c = State.chats.get(State.activeChat);
                if(c && c.type==='dm') {
                    State.nicks[c.dm_username] = nick;
                    localStorage.setItem('y_n', JSON.stringify(State.nicks));
                    document.getElementById('chat-title').textContent = nick || c.dm_username;
                    this.loadChats();
                }
            },

            async manageSessions() {
                try {
                    const s = await req('/api/sessions');
                    let t = "Sessions:\n"; s.forEach(x => t += `- ${x.device} (${new Date(x.created_at).toLocaleDateString()})\n`);
                    alert(t + "\n(In a full app, you could click to terminate these)");
                } catch(e){}
            }
        };

        window.onload = () => UI.init();
    </script>
</body>
</html>
