<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YukiChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --msg-sent: #6366f1;
            --msg-received: #334155;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, var(--bg-color), #1e1b4b);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* --- AUTH SCREEN --- */
        #auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .auth-box { padding: 40px; width: 90%; max-width: 400px; text-align: center; }
        .auth-box h1 { margin-bottom: 24px; font-weight: 600; color: #fff; }
        .input-field {
            width: 100%; padding: 12px 16px; margin-bottom: 16px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            border-radius: 8px; color: white; outline: none; transition: 0.2s;
        }
        .input-field:focus { border-color: var(--primary); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: var(--primary); color: white; font-weight: 500;
            cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .toggle-auth { margin-top: 16px; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .toggle-auth:hover { color: white; }

        /* --- APP SCREEN --- */
        #app-container { display: none; width: 100%; height: 100%; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .chat-layout { display: flex; width: 100%; height: 100%; overflow: hidden; position: relative; }
        
        /* Sidebar */
        .sidebar { width: 320px; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; height: 100%; transition: 0.3s; background: rgba(15, 23, 42, 0.4); }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; padding: 5px; transition: 0.2s; }
        .icon-btn:hover { color: white; }
        
        .search-bar { margin: 15px; width: calc(100% - 30px); margin-bottom: 0; }
        .list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        
        .user-item {
            display: flex; align-items: center; padding: 12px; margin-bottom: 8px;
            border-radius: 8px; cursor: pointer; transition: 0.2s; gap: 12px;
        }
        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item.active { background: var(--primary); color: white; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #334155; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #fff;}
        .avatar-small { width: 30px; height: 30px; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.2); height: 100%; position: relative; }
        #empty-chat-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 18px; }
        
        .chat-header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--glass-border); gap: 15px; background: rgba(0,0,0,0.2); }
        .back-btn { display: none; background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .chat-header-info { display: flex; align-items: center; gap: 10px; }

        /* Pinned Messages */
        #pinned-container { background: rgba(99, 102, 241, 0.1); padding: 10px 20px; border-bottom: 1px solid var(--glass-border); font-size: 13px; display: none; cursor: pointer; border-left: 3px solid var(--primary); }
        #pinned-container span { color: var(--text-muted); font-weight: 600; margin-right: 8px; }

        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Bubbles */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; }
        .msg-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.received { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 10px 14px; border-radius: 12px; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; display: flex; flex-direction: column; }
        .sent .msg { background: var(--msg-sent); border-bottom-right-radius: 2px; }
        .received .msg { background: var(--msg-received); border-bottom-left-radius: 2px; }
        
        .msg img { max-width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; max-height: 250px; object-fit: cover; }
        .msg-deleted { font-style: italic; color: rgba(255,255,255,0.5); }
        
        /* Reply Snippet */
        .reply-snippet { background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 6px; border-left: 3px solid rgba(255,255,255,0.5); color: #ccc; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* Message Actions */
        .msg-actions { display: flex; gap: 8px; font-size: 14px; opacity: 0; transition: 0.2s; margin-top: 4px; padding: 0 4px; }
        .msg-wrapper:hover .msg-actions { opacity: 1; }
        .msg-actions span { cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .msg-actions span:hover { color: white; }
        .sent .msg-actions { justify-content: flex-end; }

        /* Input Area */
        .reply-preview { display: none; background: rgba(15, 23, 42, 0.9); padding: 10px 20px; border-top: 1px solid var(--glass-border); border-left: 3px solid var(--primary); font-size: 13px; justify-content: space-between; align-items: center;}
        .reply-preview .close { cursor: pointer; color: var(--danger); font-weight: bold; }
        
        .input-area { padding: 15px 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; align-items: center; background: rgba(0,0,0,0.2); }
        .photo-btn { cursor: pointer; font-size: 20px; color: var(--text-muted); transition: 0.2s; }
        .photo-btn:hover { color: white; }
        .photo-btn input { display: none; }
        .msg-input { margin-bottom: 0; background: rgba(255,255,255,0.05); }

        /* Settings Modal */
        #settings-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .settings-content { background: var(--bg-color); padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; border: 1px solid var(--glass-border); text-align: center; }
        .settings-content img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--primary); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: transparent; border: 1px solid var(--text-muted); }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #app-container { padding: 0; border-radius: 0; }
            .chat-layout { border-radius: 0; border: none; }
            .sidebar { width: 100%; position: absolute; z-index: 10; }
            .chat-area { position: absolute; width: 100%; z-index: 20; transform: translateX(100%); transition: transform 0.3s ease; }
            .chat-layout.show-chat .chat-area { transform: translateX(0); }
            .chat-layout.show-chat .sidebar { transform: translateX(-30%); opacity: 0; }
            .back-btn { display: block; }
            .msg-actions { opacity: 1; font-size: 16px; gap: 12px; } /* Always show actions on mobile */
        }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-container">
        <div class="auth-box glass">
            <h1>YukiChat</h1>
            <input type="text" id="username" class="input-field" placeholder="Username" autocomplete="off">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <button class="btn" id="auth-btn" onclick="handleAuth()">Login</button>
            <div class="toggle-auth" id="auth-toggle" onclick="toggleAuthMode()">Need an account? Register</div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-container">
        <div class="chat-layout glass" id="chat-layout-container">
            
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="header">
                    <h2>YukiChat</h2>
                    <div class="header-actions">
                        <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
                        <button class="icon-btn" onclick="logout()" title="Logout">🚪</button>
                    </div>
                </div>
                <input type="text" id="search" class="input-field search-bar" placeholder="Search users..." onkeyup="searchUsers()">
                <div id="user-list" class="list-container">
                    <!-- Dynamic List -->
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div id="empty-chat-state">Select a user to start chatting</div>
                
                <div id="active-chat-ui" style="display: none; height: 100%; flex-direction: column;">
                    <div class="chat-header">
                        <button class="back-btn" onclick="closeChat()">&#8592;</button>
                        <div class="chat-header-info">
                            <img id="chat-header-avatar" class="avatar avatar-small" src="" alt="A">
                            <h3 id="chat-title">Username</h3>
                        </div>
                    </div>
                    
                    <div id="pinned-container" onclick="scrollToPinned()">
                        <span>📌 Pinned:</span> <span id="pinned-text" style="color:white; font-weight:normal;"></span>
                    </div>

                    <div class="messages" id="messages-container"></div>
                    
                    <div class="reply-preview" id="reply-preview">
                        <div><span style="color:var(--primary); font-weight:bold;">Replying to:</span> <span id="reply-preview-text">...</span></div>
                        <div class="close" onclick="cancelReply()">✕</div>
                    </div>

                    <div class="input-area">
                        <label class="photo-btn" title="Send Photo">
                            📷<input type="file" id="photo-upload" accept="image/*" onchange="sendPhoto(event)">
                        </label>
                        <input type="text" id="message-input" class="input-field msg-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
                        <button class="btn" style="width: 80px;" onclick="sendTextMessage()">Send</button>
                    </div>
                </div>
            </div>
            
            <!-- Settings Modal -->
            <div id="settings-modal">
                <div class="settings-content">
                    <h3>Profile Settings</h3>
                    <div style="margin: 20px 0;">
                        <img id="settings-avatar-preview" src="" alt="Avatar">
                        <label class="btn" style="display:inline-block; padding: 6px 12px; font-size:12px; margin-bottom: 15px;">
                            Change Avatar
                            <input type="file" style="display:none;" accept="image/*" onchange="previewAvatar(event)">
                        </label>
                        <input type="text" id="settings-username" class="input-field" placeholder="New Username">
                    </div>
                    <div class="modal-buttons">
                        <button class="btn btn-cancel" onclick="closeSettings()">Cancel</button>
                        <button class="btn" onclick="saveSettings()">Save</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // CONFIGURATION
        const API_BASE = 'https://yukichat.kviappsgames.workers.dev'; // <--- REPLACE IF NEEDED
        
        let state = {
            isLogin: true,
            token: localStorage.getItem('yuki_token'),
            userId: localStorage.getItem('yuki_userId'),
            username: localStorage.getItem('yuki_username'),
            activeChatId: null,
            activeChatName: '',
            pollInterval: null,
            replyingToId: null,
            newAvatarBase64: null,
            allMessages:[] // To quickly find pinned/replied texts locally
        };

        // Initialize App
        window.onload = async () => {
            if (state.token) { 
                showApp(); 
                await loadChatList();
                checkUrlForUser();
            }
        };

        // --- DEEP LINKING (?user=username) ---
        async function checkUrlForUser() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUsername = urlParams.get('user');
            if (targetUsername) {
                // Remove parameter from URL to prevent loops
                window.history.replaceState({}, document.title, window.location.pathname);
                const res = await api(`/api/user/username/${targetUsername}`);
                if (res && res.id) {
                    openChat(res.id, res.username, res.avatar);
                }
            }
        }

        // --- AUTHENTICATION ---
        function toggleAuthMode() {
            state.isLogin = !state.isLogin;
            document.getElementById('auth-btn').innerText = state.isLogin ? 'Login' : 'Register';
            document.getElementById('auth-toggle').innerText = state.isLogin ? 'Need an account? Register' : 'Have an account? Login';
        }

        async function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return alert('Fill all fields');

            const endpoint = state.isLogin ? '/api/login' : '/api/register';
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });
                const data = await res.json();
                if(res.ok) {
                    state.token = data.token; state.userId = data.userId; state.username = data.username;
                    localStorage.setItem('yuki_token', data.token);
                    localStorage.setItem('yuki_userId', data.userId);
                    localStorage.setItem('yuki_username', data.username);
                    showApp();
                    await loadChatList();
                    checkUrlForUser();
                } else alert(data.error);
            } catch (err) { alert('Network error'); }
        }

        function logout() {
            localStorage.clear();
            state.token = null; state.userId = null; state.activeChatId = null;
            clearInterval(state.pollInterval);
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('auth-container').style.display = 'flex';
        }

        function showApp() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
        }

        // --- API HELPERS ---
        async function api(path, method = 'GET', body = null) {
            const options = { method, headers: { 'Authorization': `Bearer ${state.token}` } };
            if (body) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(body);
            }
            const res = await fetch(`${API_BASE}${path}`, options);
            if (res.status === 401) logout();
            return res.json();
        }

        function getAvatarUrl(avatarStr, username) {
            if (avatarStr && avatarStr.startsWith('data:image')) return avatarStr;
            // Generate deterministic default avatar
            return `https://api.dicebear.com/7.x/initials/svg?seed=${username}&backgroundColor=6366f1`;
        }

        // --- CHAT LIST & SEARCH ---
        async function loadChatList() {
            const chats = await api('/api/chats');
            renderUserList(chats);
        }

        let searchTimeout;
        function searchUsers() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const q = document.getElementById('search').value.trim();
                if (!q) return loadChatList();
                const users = await api(`/api/users/search?q=${q}`);
                renderUserList(users);
            }, 300);
        }

        function renderUserList(users) {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = `user-item ${state.activeChatId == u.id ? 'active' : ''}`;
                
                const img = document.createElement('img');
                img.className = 'avatar';
                img.src = getAvatarUrl(u.avatar, u.username);
                
                const name = document.createElement('div');
                name.innerText = u.username;
                
                div.appendChild(img);
                div.appendChild(name);
                div.onclick = () => openChat(u.id, u.username, u.avatar);
                list.appendChild(div);
            });
        }

        // --- PROFILE SETTINGS ---
        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            document.getElementById('settings-username').value = state.username;
            document.getElementById('settings-avatar-preview').src = getAvatarUrl(null, state.username);
            state.newAvatarBase64 = null;
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                compressImage(e.target.result, 300, (base64) => {
                    document.getElementById('settings-avatar-preview').src = base64;
                    state.newAvatarBase64 = base64;
                });
            }
            reader.readAsDataURL(file);
        }
        
        async function saveSettings() {
            const newName = document.getElementById('settings-username').value.trim();
            const body = { username: newName };
            if (state.newAvatarBase64) body.avatar = state.newAvatarBase64;
            
            const res = await api('/api/settings', 'POST', body);
            if(res.success) {
                state.username = newName;
                localStorage.setItem('yuki_username', newName);
                closeSettings();
                loadChatList();
            } else alert(res.error || 'Failed to update');
        }

        // --- MESSAGING ---
        function openChat(id, username, avatar) {
            state.activeChatId = id;
            state.activeChatName = username;
            cancelReply();
            
            document.getElementById('empty-chat-state').style.display = 'none';
            document.getElementById('active-chat-ui').style.display = 'flex';
            document.getElementById('chat-title').innerText = username;
            document.getElementById('chat-header-avatar').src = getAvatarUrl(avatar, username);
            
            document.getElementById('chat-layout-container').classList.add('show-chat');
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            loadChatList(); // Refresh active state visually

            document.getElementById('messages-container').innerHTML = '';
            fetchMessages();
            clearInterval(state.pollInterval);
            state.pollInterval = setInterval(fetchMessages, 3000);
        }

        function closeChat() {
            document.getElementById('chat-layout-container').classList.remove('show-chat');
            state.activeChatId = null;
            clearInterval(state.pollInterval);
        }

        async function fetchMessages() {
            if (!state.activeChatId) return;
            const msgs = await api(`/api/messages/${state.activeChatId}`);
            state.allMessages = msgs;
            renderMessages(msgs);
        }

        function renderMessages(msgs) {
            const container = document.getElementById('messages-container');
            const isScrolledToBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
            container.innerHTML = '';
            
            // Handle Pinned
            const pinnedMsgs = msgs.filter(m => m.is_pinned && !m.is_deleted);
            const pinnedEl = document.getElementById('pinned-container');
            if(pinnedMsgs.length > 0) {
                pinnedEl.style.display = 'block';
                const lastPinned = pinnedMsgs[pinnedMsgs.length-1];
                document.getElementById('pinned-text').innerText = lastPinned.type === 'photo' ? '📷 Photo' : lastPinned.content;
            } else {
                pinnedEl.style.display = 'none';
            }

            msgs.forEach(m => {
                const isSent = m.sender_id == state.userId;
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isSent ? 'sent' : 'received'}`;
                wrapper.id = `msg-${m.id}`;
                
                let msgHtml = `<div class="msg">`;
                
                // Reply Snippet
                if (m.reply_to) {
                    let replyText = "Message deleted";
                    if (m.reply_content) {
                        replyText = m.reply_type === 'photo' ? '📷 Photo' : m.reply_content;
                    }
                    msgHtml += `<div class="reply-snippet">${replyText}</div>`;
                }

                // Main Content
                if (m.is_deleted) {
                    msgHtml += `<span class="msg-deleted">Message deleted</span>`;
                } else if (m.type === 'photo') {
                    msgHtml += `<img src="${m.content}" onclick="window.open('${m.content}')" />`;
                } else {
                    msgHtml += `<span>${m.content}</span>`;
                }
                msgHtml += `</div>`;
                
                // Actions (Reply, Pin, Delete)
                if (!m.is_deleted) {
                    let actions = `<div class="msg-actions">
                        <span onclick="setupReply(${m.id}, '${m.type === 'photo' ? 'Photo' : m.content.replace(/'/g, "\\'")}')" title="Reply">↩️</span>
                        <span onclick="togglePin(${m.id})" title="${m.is_pinned ? 'Unpin' : 'Pin'}">${m.is_pinned ? '📍' : '📌'}</span>`;
                    if(isSent) actions += `<span onclick="deleteMessage(${m.id})" title="Delete">🗑️</span>`;
                    actions += `</div>`;
                    msgHtml += actions;
                }
                
                wrapper.innerHTML = msgHtml;
                container.appendChild(wrapper);
            });

            if (isScrolledToBottom) container.scrollTop = container.scrollHeight;
        }

        // --- MESSAGE ACTIONS ---
        function setupReply(id, text) {
            state.replyingToId = id;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-preview-text').innerText = text.substring(0, 50) + (text.length > 50 ? '...' : '');
            document.getElementById('message-input').focus();
        }
        function cancelReply() {
            state.replyingToId = null;
            document.getElementById('reply-preview').style.display = 'none';
        }
        
        async function togglePin(id) {
            await api(`/api/messages/${id}/pin`, 'PUT');
            fetchMessages();
        }

        async function deleteMessage(id) {
            if(!confirm("Delete this message?")) return;
            await api(`/api/messages/${id}`, 'DELETE');
            fetchMessages();
        }

        function scrollToPinned() {
            const container = document.getElementById('messages-container');
            container.scrollTop = 0; // Simple fallback, real app would find the ID and scrollIntoView
        }

        function handleEnter(e) { if(e.key === 'Enter') sendTextMessage(); }

        async function sendTextMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !state.activeChatId) return;
            
            input.value = '';
            const replyId = state.replyingToId;
            cancelReply();

            await api(`/api/messages/${state.activeChatId}`, 'POST', { content: text, type: 'text', reply_to: replyId });
            fetchMessages();
            loadChatList(); 
        }

        function sendPhoto(event) {
            const file = event.target.files[0];
            if (!file || !state.activeChatId) return;
            
            const reader = new FileReader();
            reader.onload = e => {
                compressImage(e.target.result, 800, async (base64) => {
                    const replyId = state.replyingToId;
                    cancelReply();
                    await api(`/api/messages/${state.activeChatId}`, 'POST', { content: base64, type: 'photo', reply_to: replyId });
                    fetchMessages();
                    loadChatList();
                });
            }
            reader.readAsDataURL(file);
            event.target.value = ''; // Reset
        }

        // Utility: Canvas Compression
        function compressImage(dataUrl, maxSize, callback) {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } } 
                else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
                
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            }
            img.src = dataUrl;
        }
    </script>
</body>
</html>
