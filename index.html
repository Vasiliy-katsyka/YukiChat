<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YukiChat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
        /* Theme Variables */
        :root {
            /* Default Dark Theme */
            --bg-base: #0b1120;
            --bg-panel: rgba(15, 23, 42, 0.65);
            --bg-input: rgba(0, 0, 0, 0.3);
            --bg-hover: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --msg-sent: #2563eb;
            --msg-received: #1e293b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-base: #f0f4f8;
            --bg-panel: rgba(255, 255, 255, 0.85);
            --bg-input: rgba(255, 255, 255, 0.9);
            --bg-hover: rgba(0, 0, 0, 0.05);
            --border-color: rgba(0, 0, 0, 0.1);
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --msg-sent: #0ea5e9;
            --msg-received: #e2e8f0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        [data-theme="midnight"] {
            --bg-base: #000000;
            --bg-panel: rgba(10, 10, 10, 0.9);
            --bg-input: rgba(20, 20, 20, 1);
            --bg-hover: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --msg-sent: #8b5cf6;
            --msg-received: #18181b;
            --shadow: 0 8px 32px rgba(255, 255, 255, 0.02);
        }
    
        /* Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            /* Use dvh to fix mobile address bar overflow issues */
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            transition: background 0.3s ease, color 0.3s ease;
        }
    
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
        /* Reusable UI */
        .glass {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
        }
        
        .avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-input);
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 20px;
            border: none; border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-weight: 600; font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-field {
            width: 100%; padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
            outline: none; font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: var(--primary); }
    
        /* Auth Screen */
        #auth-container {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; z-index: 50;
            background: var(--bg-base);
        }
        .auth-box {
            padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px;
            text-align: center; box-shadow: var(--shadow);
        }
        .auth-box h1 { margin-bottom: 30px; }
        .auth-box .input-field { margin-bottom: 16px; }
        .auth-box .btn { width: 100%; margin-top: 8px; }
        .toggle-auth { margin-top: 24px; color: var(--text-muted); cursor: pointer; font-size: 14px; }
        .toggle-auth:hover { color: var(--text-main); }
    
        /* Main App Layout */
        #app-container {
            display: none; width: 100%; height: 100%;
            max-width: 1600px; margin: 0 auto;
        }
        .chat-layout {
            display: flex; width: 100%; height: 100%;
            position: relative;
        }
    
        /* Sidebar */
        .sidebar {
            width: 320px; flex-shrink: 0;
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            background: var(--bg-panel);
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .profile-btn {
            cursor: pointer; display: flex; align-items: center; gap: 12px; flex: 1;
            padding: 6px; border-radius: 12px; transition: 0.2s;
        }
        .profile-btn:hover { background: var(--bg-hover); }
        .profile-btn h2 { font-size: 18px; font-weight: 600; }
        
        .search-container { padding: 12px 16px; }
        .list-container { flex: 1; overflow-y: auto; padding: 8px; }
        .user-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; margin-bottom: 4px;
            cursor: pointer; border-radius: 12px;
            transition: 0.2s;
        }
        .user-item:hover { background: var(--bg-hover); }
        .user-item.active { background: var(--primary); color: #fff; }
        .user-item.active .text-muted { color: rgba(255,255,255,0.7); }
        .user-item-name { font-weight: 500; font-size: 15px; }
    
        /* Chat Area */
        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-base); position: relative; min-width: 0;
        }
        #empty-chat-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 16px;
        }
    
        /* Chat Header */
        .chat-header {
            padding: 12px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-panel); backdrop-filter: blur(10px);
            z-index: 5;
        }
        .back-btn {
            display: none; background: none; border: none;
            color: var(--text-main); font-size: 24px; cursor: pointer;
            padding: 4px 8px; margin-left: -8px;
        }
    
        .pinned-bar {
            background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--warning);
            padding: 10px 20px; font-size: 13px;
            display: none; align-items: center; justify-content: space-between;
            color: var(--text-main); cursor: pointer; border-bottom: 1px solid var(--border-color);
        }
        
        /* Messages */
        .messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .msg-row {
            display: flex; gap: 10px; max-width: 80%; width: fit-content;
            align-items: flex-end; position: relative;
        }
        .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.received { align-self: flex-start; }
        .msg-row .avatar { width: 28px; height: 28px; }
    
        .msg-bubble {
            padding: 10px 14px; position: relative; word-wrap: break-word;
            font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            cursor: pointer; /* To trigger actions */
            transition: opacity 0.2s;
        }
        .msg-row.sent .msg-bubble { background: var(--msg-sent); color: #fff; border-radius: 18px 18px 4px 18px; }
        .msg-row.received .msg-bubble { background: var(--msg-received); color: var(--text-main); border-radius: 18px 18px 18px 4px; }
        .msg-row.pending { opacity: 0.6; }
        
        .msg-bubble img {
            max-width: 100%; max-height: 250px;
            border-radius: 8px; margin-top: 4px;
            cursor: zoom-in; display: block;
        }
        
        .msg-deleted { font-style: italic; opacity: 0.7; font-size: 14px; }
        .msg-time { font-size: 11px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .msg-row.received .msg-time { text-align: left; }
        
        .reply-snippet {
            font-size: 13px; background: rgba(0,0,0,0.2);
            padding: 6px 10px; border-radius: 6px;
            border-left: 3px solid rgba(255,255,255,0.5);
            margin-bottom: 6px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 100%;
        }
        
        /* Input Area */
        .reply-preview-bar {
            display: none; background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            padding: 10px 20px; align-items: center; justify-content: space-between;
            font-size: 13px; border-left: 4px solid var(--primary);
            color: var(--text-muted);
        }
        .reply-preview-bar b { color: var(--text-main); }
        .close-icon { cursor: pointer; font-size: 16px; padding: 4px; }
        
        .input-area {
            padding: 12px 20px; background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            display: flex; gap: 10px; align-items: flex-end;
        }
        .msg-input {
            flex: 1; resize: none; overflow-y: auto;
            min-height: 44px; max-height: 120px;
            border-radius: 22px; padding: 12px 16px;
            background: var(--bg-input); line-height: 1.4;
        }
        .msg-input::-webkit-scrollbar { display: none; }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-input); cursor: pointer;
            transition: 0.2s; font-size: 18px; color: var(--text-main); border: none;
        }
        .icon-btn:hover { background: var(--bg-hover); }
        .icon-btn input { display: none; }
    
        /* Modals & Context Menus */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-base); padding: 30px;
            border-radius: 20px; width: 90%; max-width: 400px;
            border: 1px solid var(--border-color); box-shadow: var(--shadow);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .setting-group { margin-bottom: 20px; text-align: left; }
        .setting-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .setting-group select { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); }

        /* Context Menu (Touch friendly) */
        #context-menu {
            display: none; position: fixed;
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: var(--shadow);
            z-index: 200; overflow: hidden; min-width: 150px;
            backdrop-filter: blur(20px);
        }
        .ctx-item {
            padding: 12px 16px; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            color: var(--text-main); background: transparent; border: none; width: 100%; text-align: left;
        }
        .ctx-item:hover { background: var(--bg-hover); }
        .ctx-item.danger { color: var(--danger); }
        
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
        /* Mobile Layout */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; border: none; transition: transform 0.3s ease; }
            .chat-area { width: 100%; height: 100%; position: absolute; transform: translateX(100%); transition: transform 0.3s ease; }
            
            .show-chat .sidebar { transform: translateX(-30%); opacity: 0; pointer-events: none; }
            .show-chat .chat-area { transform: translateX(0); }
            
            .back-btn { display: block; }
            .msg-row { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-container">
        <div class="auth-box glass">
            <h1 id="auth-title">YukiChat</h1>
            <input type="text" id="username" class="input-field" placeholder="Username" autocomplete="off">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <button class="btn" id="auth-btn" onclick="UI.handleAuth()">Login</button>
            <div class="toggle-auth" id="auth-toggle" onclick="UI.toggleAuthMode()">Need an account? Register</div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-container">
        <div class="chat-layout glass" id="chat-layout-container">
            
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="profile-btn" onclick="UI.openSettings()">
                        <img src="" id="my-avatar" class="avatar" alt="Me">
                        <div>
                            <h2>YukiChat</h2>
                            <div style="font-size: 12px; color: var(--text-muted)">Settings</div>
                        </div>
                    </div>
                </div>
                <div class="search-container">
                    <input type="text" id="search" class="input-field" placeholder="Search users..." oninput="App.searchUsers(this.value)">
                </div>
                <div id="user-list" class="list-container"></div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div id="empty-chat-state">
                    <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;">💬</div>
                    Select a user to start chatting
                </div>
                
                <div id="active-chat-ui" style="display: none; height: 100%; flex-direction: column;">
                    <div class="chat-header">
                        <button class="back-btn" onclick="UI.closeChat()">&#8592;</button>
                        <img src="" id="chat-avatar" class="avatar">
                        <h3 id="chat-title">Username</h3>
                    </div>
                    
                    <div id="pinned-bar" class="pinned-bar" onclick="UI.scrollToPinned()">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            📌 <b id="pinned-text">Pinned Message</b>
                        </span>
                    </div>

                    <div class="messages" id="messages-container"></div>
                    
                    <div id="reply-preview-bar" class="reply-preview-bar">
                        <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            Replying to: <b id="reply-preview-text">...</b>
                        </div>
                        <span class="close-icon" onclick="App.cancelReply()">✕</span>
                    </div>
                    
                    <div class="input-area">
                        <label class="icon-btn">📷<input type="file" accept="image/jpeg, image/png, image/webp" onchange="App.sendPhoto(event)"></label>
                        <textarea id="message-input" class="input-field msg-input" placeholder="Type a message..." rows="1" oninput="UI.autoResizeInput(this)" onkeydown="UI.handleEnter(event)"></textarea>
                        <button class="icon-btn" style="background: var(--primary); color: white;" onclick="App.sendTextMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" onclick="if(event.target===this) UI.closeSettings()">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; text-align: center;">Settings</h2>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <label style="cursor: pointer;">
                    <img src="" id="settings-avatar-preview" class="avatar" style="width: 100px; height: 100px; border: 3px solid var(--primary);">
                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">Tap to change avatar</div>
                    <input type="file" style="display:none;" accept="image/jpeg, image/png, image/webp" onchange="App.previewAvatar(event)">
                </label>
            </div>

            <div class="setting-group">
                <label>Theme</label>
                <select id="theme-selector" onchange="UI.changeTheme(this.value)">
                    <option value="dark">Dark (Default)</option>
                    <option value="light">Light</option>
                    <option value="midnight">Midnight Purple</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn" style="flex: 1; background: var(--bg-input); color: var(--text-main);" onclick="UI.closeSettings()">Cancel</button>
                <button class="btn" style="flex: 1;" onclick="App.saveProfile()">Save</button>
            </div>
            <button class="btn" style="width: 100%; background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 10px;" onclick="App.logout()">Logout</button>
        </div>
    </div>

    <!-- Global Context Menu -->
    <div id="context-menu">
        <button class="ctx-item" id="ctx-reply">↩ Reply</button>
        <button class="ctx-item" id="ctx-copy">📋 Copy Text</button>
        <button class="ctx-item" id="ctx-pin">📌 Pin/Unpin</button>
        <button class="ctx-item danger" id="ctx-delete">🗑 Delete</button>
    </div>

    <script>
        // --- CONSTANTS & CONFIG ---
        const API_BASE = 'https://yukichat.kviappsgames.workers.dev';
        // Safe base64 SVG to prevent quote breaking
        const DEFAULT_AVATAR = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzllOWU5ZSI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDQgMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==";

        // --- STATE MANAGEMENT ---
        const State = {
            isLoginMode: true,
            token: localStorage.getItem('yuki_token'),
            userId: parseInt(localStorage.getItem('yuki_userId')) || null,
            myAvatar: localStorage.getItem('yuki_avatar') || DEFAULT_AVATAR,
            theme: localStorage.getItem('yuki_theme') || 'dark',
            
            activeChatId: null,
            activeChatName: '',
            activeChatAvatar: '',
            
            pollInterval: null,
            replyingToId: null,
            messagesMap: new Map(), // Use Map for cleaner data management
            
            searchTimeout: null,
            pendingAvatarBase64: null,
            contextTargetId: null // ID of message clicked for context menu
        };

        // --- API HELPERS ---
        const API = {
            async request(path, method = 'GET', body = null) {
                const options = { method, headers: {} };
                if (State.token) options.headers['Authorization'] = `Bearer ${State.token}`;
                if (body) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(body);
                }
                
                try {
                    const res = await fetch(`${API_BASE}${path}`, options);
                    if (res.status === 401) return App.logout();
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'API Error');
                    return data;
                } catch (err) {
                    console.error("API Call Failed:", err);
                    throw err;
                }
            }
        };

        // --- DOM BUILDER UTILITY (Prevents XSS) ---
        const DOM = {
            create(tag, className = '', textContent = '') {
                const el = document.createElement(tag);
                if (className) el.className = className;
                if (textContent) el.textContent = textContent;
                return el;
            }
        };

        // --- UI/UX CONTROLLER ---
        const UI = {
            init() {
                this.changeTheme(State.theme);
                document.getElementById('theme-selector').value = State.theme;
                
                // Close context menu on outside click
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#context-menu') && !e.target.closest('.msg-bubble')) {
                        this.closeContextMenu();
                    }
                });

                if (State.token) {
                    this.showApp();
                    App.loadChatList();
                    App.checkDeepLink();
                }
            },

            changeTheme(theme) {
                State.theme = theme;
                localStorage.setItem('yuki_theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
            },

            toggleAuthMode() {
                State.isLoginMode = !State.isLoginMode;
                document.getElementById('auth-btn').textContent = State.isLoginMode ? 'Login' : 'Register';
                document.getElementById('auth-title').textContent = State.isLoginMode ? 'YukiChat' : 'Create Account';
                document.getElementById('auth-toggle').textContent = State.isLoginMode ? 'Need an account? Register' : 'Have an account? Login';
            },

            async handleAuth() {
                const btn = document.getElementById('auth-btn');
                const user = document.getElementById('username').value.trim();
                const pass = document.getElementById('password').value.trim();
                
                if (!user || !pass) return alert('Fill all fields');
                
                btn.disabled = true;
                btn.textContent = 'Loading...';

                try {
                    const endpoint = State.isLoginMode ? '/api/login' : '/api/register';
                    const data = await API.request(endpoint, 'POST', { username: user, password: pass });
                    
                    State.token = data.token;
                    State.userId = data.userId;
                    State.myAvatar = data.avatar || DEFAULT_AVATAR;
                    
                    localStorage.setItem('yuki_token', data.token);
                    localStorage.setItem('yuki_userId', data.userId);
                    localStorage.setItem('yuki_avatar', State.myAvatar);
                    
                    this.showApp();
                    App.loadChatList();
                    App.checkDeepLink();
                } catch (err) {
                    alert(err.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = State.isLoginMode ? 'Login' : 'Register';
                }
            },

            showApp() {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('my-avatar').src = State.myAvatar;
            },

            autoResizeInput(el) {
                el.style.height = 'auto';
                el.style.height = (el.scrollHeight) + 'px';
            },

            handleEnter(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    App.sendTextMessage();
                }
            },

            openSettings() {
                document.getElementById('settings-modal').style.display = 'flex';
                document.getElementById('settings-avatar-preview').src = State.myAvatar;
                State.pendingAvatarBase64 = null;
            },

            closeSettings() {
                document.getElementById('settings-modal').style.display = 'none';
            },

            closeChat() {
                document.getElementById('chat-layout-container').classList.remove('show-chat');
                State.activeChatId = null;
                clearInterval(State.pollInterval);
            },

            scrollToPinned() {
                const container = document.getElementById('messages-container');
                container.scrollTop = 0; // Simplistic scroll to top where pin likely is, can be upgraded
            },

            // --- Context Menu Logic ---
            openContextMenu(e, msgId, isSent, isDeleted, type, text) {
                e.preventDefault();
                State.contextTargetId = msgId;
                const menu = document.getElementById('context-menu');
                
                // Position logic
                let x = e.clientX;
                let y = e.clientY;
                menu.style.display = 'block';
                
                // Boundary checks
                if (x + menu.offsetWidth > window.innerWidth) x -= menu.offsetWidth;
                if (y + menu.offsetHeight > window.innerHeight) y -= menu.offsetHeight;
                
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';

                // Setup buttons
                document.getElementById('ctx-reply').onclick = () => { App.initReply(msgId); this.closeContextMenu(); };
                
                const copyBtn = document.getElementById('ctx-copy');
                if (type === 'text' && !isDeleted) {
                    copyBtn.style.display = 'block';
                    copyBtn.onclick = () => { navigator.clipboard.writeText(text); this.closeContextMenu(); };
                } else copyBtn.style.display = 'none';

                document.getElementById('ctx-pin').onclick = () => { App.togglePin(msgId); this.closeContextMenu(); };
                
                const delBtn = document.getElementById('ctx-delete');
                if (isSent && !isDeleted) {
                    delBtn.style.display = 'block';
                    delBtn.onclick = () => { App.deleteMsg(msgId); this.closeContextMenu(); };
                } else delBtn.style.display = 'none';
            },

            closeContextMenu() {
                document.getElementById('context-menu').style.display = 'none';
                State.contextTargetId = null;
            }
        };

        // --- CORE APPLICATION LOGIC ---
        const App = {
            logout() {
                localStorage.clear();
                window.location.reload();
            },

            async checkDeepLink() {
                const urlParams = new URLSearchParams(window.location.search);
                const userParam = urlParams.get('user');
                if (userParam && State.token) {
                    try {
                        const u = await API.request(`/api/users/by-name/${encodeURIComponent(userParam)}`);
                        if (u && u.id && u.id !== State.userId) {
                            this.openChat(u.id, u.username, u.avatar);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    } catch(e) { console.warn("User from deep link not found"); }
                }
            },

            async loadChatList() {
                try {
                    const users = await API.request('/api/chats');
                    this.renderUserList(users);
                } catch (e) {}
            },

            searchUsers(query) {
                clearTimeout(State.searchTimeout);
                State.searchTimeout = setTimeout(async () => {
                    const q = query.trim();
                    const endpoint = q ? `/api/users/search?q=${encodeURIComponent(q)}` : '/api/chats';
                    try {
                        const users = await API.request(endpoint);
                        this.renderUserList(users);
                    } catch(e) {}
                }, 300);
            },

            renderUserList(users) {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                
                if(users.length === 0) {
                    list.appendChild(DOM.create('div', 'user-item', 'No users found'));
                    return;
                }

                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = `user-item ${State.activeChatId === u.id ? 'active' : ''}`;
                    
                    const img = document.createElement('img');
                    img.src = u.avatar || DEFAULT_AVATAR;
                    img.className = 'avatar';
                    
                    const info = DOM.create('div', 'user-item-info');
                    info.appendChild(DOM.create('div', 'user-item-name', u.username));
                    
                    div.appendChild(img);
                    div.appendChild(info);
                    
                    div.onclick = () => this.openChat(u.id, u.username, u.avatar);
                    list.appendChild(div);
                });
            },

            openChat(id, username, avatar) {
                State.activeChatId = id;
                State.activeChatName = username;
                State.activeChatAvatar = avatar || DEFAULT_AVATAR;
                
                this.cancelReply();
                
                document.getElementById('empty-chat-state').style.display = 'none';
                document.getElementById('active-chat-ui').style.display = 'flex';
                document.getElementById('chat-title').textContent = username;
                document.getElementById('chat-avatar').src = State.activeChatAvatar;
                
                // For Mobile view
                document.getElementById('chat-layout-container').classList.add('show-chat');
                
                // Highlight active user in sidebar
                document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
                
                // Initial fetch and start polling
                document.getElementById('messages-container').innerHTML = ''; // Clear old chat
                State.messagesMap.clear();
                
                this.fetchMessages();
                clearInterval(State.pollInterval);
                State.pollInterval = setInterval(() => this.fetchMessages(), 3000);
            },

            // SAFE RENDERING (Diffing/Appending)
            async fetchMessages() {
                if (!State.activeChatId) return;
                
                try {
                    const msgs = await API.request(`/api/messages/${State.activeChatId}`);
                    const container = document.getElementById('messages-container');
                    
                    // Check if user is scrolled near bottom before update
                    const isNearBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                    
                    let pinnedMsg = null;

                    msgs.forEach(m => {
                        State.messagesMap.set(m.id, m);
                        if(m.is_pinned) pinnedMsg = m;

                        let existingNode = document.getElementById(`msg-${m.id}`);
                        
                        // If it doesn't exist in DOM, build it safely
                        if (!existingNode) {
                            existingNode = this.buildMessageNode(m);
                            container.appendChild(existingNode);
                        } else {
                            // If it exists, check if we need to update it (deleted or pinned status)
                            const isCurrentlyDeleted = existingNode.dataset.deleted === 'true';
                            if (m.is_deleted && !isCurrentlyDeleted) {
                                existingNode.replaceWith(this.buildMessageNode(m)); // Rebuild deleted
                            }
                        }
                    });

                    // Update Pinned Bar
                    const pinBar = document.getElementById('pinned-bar');
                    if (pinnedMsg && !pinnedMsg.is_deleted) {
                        const txt = pinnedMsg.type === 'photo' ? '📷 Photo' : pinnedMsg.content;
                        document.getElementById('pinned-text').textContent = txt;
                        pinBar.style.display = 'flex';
                    } else {
                        pinBar.style.display = 'none';
                    }

                    // Auto scroll
                    if (isNearBottom) container.scrollTop = container.scrollHeight;

                } catch(e) { console.error("Message sync error"); }
            },

            buildMessageNode(m) {
                const isSent = m.sender_id === State.userId;
                const avatarSrc = isSent ? State.myAvatar : State.activeChatAvatar;
                
                const row = document.createElement('div');
                row.className = `msg-row ${isSent ? 'sent' : 'received'}`;
                row.id = `msg-${m.id}`;
                row.dataset.deleted = m.is_deleted ? 'true' : 'false';
                
                const img = document.createElement('img');
                img.src = avatarSrc; img.className = 'avatar';
                
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                
                // Context Menu Trigger
                bubble.onclick = (e) => UI.openContextMenu(e, m.id, isSent, m.is_deleted, m.type, m.content);

                if (m.is_deleted) {
                    const delNode = DOM.create('div', 'msg-deleted', '🚫 This message was deleted');
                    bubble.appendChild(delNode);
                } else {
                    // Reply Snippet
                    if (m.reply_to_id) {
                        const repMsg = State.messagesMap.get(m.reply_to_id);
                        let repTxt = repMsg ? (repMsg.type === 'photo' ? '📷 Photo' : repMsg.content) : 'Replied message';
                        if(repMsg && repMsg.is_deleted) repTxt = 'Deleted message';
                        bubble.appendChild(DOM.create('div', 'reply-snippet', repTxt));
                    }

                    // Content
                    if (m.type === 'photo') {
                        const pImg = document.createElement('img');
                        pImg.src = m.content;
                        pImg.onclick = (e) => { e.stopPropagation(); window.open(m.content); };
                        bubble.appendChild(pImg);
                    } else {
                        const textNode = DOM.create('div', '', m.content);
                        if(m.is_pinned) textNode.innerHTML += ' <span style="font-size:12px;opacity:0.8">📌</span>';
                        bubble.appendChild(textNode);
                    }
                    
                    // Time (Optional enhancement: if API provides timestamp, use it. Here mocking current time for optimistic)
                    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    bubble.appendChild(DOM.create('div', 'msg-time', time));
                }

                row.appendChild(img);
                row.appendChild(bubble);
                return row;
            },

            // --- ACTIONS ---
            initReply(id) {
                State.replyingToId = id;
                const msg = State.messagesMap.get(id);
                if(!msg) return;
                
                let txt = msg.type === 'photo' ? '📷 Photo' : msg.content;
                if(msg.is_deleted) txt = "Deleted message";
                
                document.getElementById('reply-preview-text').textContent = txt;
                document.getElementById('reply-preview-bar').style.display = 'flex';
                document.getElementById('message-input').focus();
            },

            cancelReply() {
                State.replyingToId = null;
                document.getElementById('reply-preview-bar').style.display = 'none';
            },

            async deleteMsg(id) {
                if(!confirm("Delete message?")) return;
                try {
                    await API.request(`/api/messages/${id}/action`, 'POST', { action: 'delete' });
                    this.fetchMessages();
                } catch(e) { alert("Failed to delete"); }
            },

            async togglePin(id) {
                try {
                    await API.request(`/api/messages/${id}/action`, 'POST', { action: 'pin' });
                    this.fetchMessages();
                } catch(e) { alert("Failed to pin"); }
            },

            async sendTextMessage() {
                const input = document.getElementById('message-input');
                const text = input.value.trim();
                if (!text || !State.activeChatId) return;
                
                input.value = '';
                input.style.height = 'auto'; // reset resize
                const replyId = State.replyingToId;
                this.cancelReply();

                // Optimistic UI Render
                const tempId = 'temp-' + Date.now();
                const tempMsg = {
                    id: tempId, content: text, type: 'text', sender_id: State.userId,
                    reply_to_id: replyId, is_deleted: false, is_pinned: false
                };
                State.messagesMap.set(tempId, tempMsg);
                
                const container = document.getElementById('messages-container');
                const tempNode = this.buildMessageNode(tempMsg);
                tempNode.classList.add('pending');
                container.appendChild(tempNode);
                container.scrollTop = container.scrollHeight;

                try {
                    await API.request(`/api/messages/${State.activeChatId}`, 'POST', { 
                        content: text, type: 'text', reply_to_id: replyId 
                    });
                    // Refresh to sync real IDs
                    this.fetchMessages(); 
                    this.loadChatList(); // Update sidebar latest message
                } catch(e) {
                    tempNode.style.opacity = '1';
                    tempNode.querySelector('.msg-bubble').style.border = '1px solid red';
                    alert("Message failed to send");
                }
            },

            // Safely handle images via Canvas compression to prevent massive JSON payloads
            sendPhoto(event) {
                const file = event.target.files[0];
                if (!file || !State.activeChatId) return;
                
                // Input validation
                if (!file.type.startsWith('image/')) return alert('Must be an image file');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = async () => {
                        // Compress Image to max 800px
                        const canvas = document.createElement('canvas');
                        const MAX = 800;
                        let w = img.width, h = img.height;
                        if (w > h && w > MAX) { h *= MAX / w; w = MAX; }
                        else if (h > MAX) { w *= MAX / h; h = MAX; }
                        
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const base64Data = canvas.toDataURL('image/jpeg', 0.6); // Compress heavily for JSON

                        const replyId = State.replyingToId;
                        this.cancelReply();

                        try {
                            await API.request(`/api/messages/${State.activeChatId}`, 'POST', { 
                                content: base64Data, type: 'photo', reply_to_id: replyId 
                            });
                            this.fetchMessages();
                        } catch(err) { alert("Failed to send photo. File might be too large."); }
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
                event.target.value = ''; // Reset input
            },

            previewAvatar(event) {
                const file = event.target.files[0];
                if (!file || !file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 200; canvas.height = 200;
                        // Cover fit math
                        const ctx = canvas.getContext('2d');
                        const scale = Math.max(200 / img.width, 200 / img.height);
                        const x = (200 / scale - img.width) / 2;
                        const y = (200 / scale - img.height) / 2;
                        ctx.scale(scale, scale);
                        ctx.drawImage(img, x, y);

                        State.pendingAvatarBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        document.getElementById('settings-avatar-preview').src = State.pendingAvatarBase64;
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            },

            async saveProfile() {
                if (State.pendingAvatarBase64) {
                    try {
                        await API.request('/api/user/profile', 'PUT', { avatar: State.pendingAvatarBase64 });
                        State.myAvatar = State.pendingAvatarBase64;
                        localStorage.setItem('yuki_avatar', State.myAvatar);
                        document.getElementById('my-avatar').src = State.myAvatar;
                    } catch(e) { alert("Failed to save avatar"); }
                }
                UI.closeSettings();
            }
        };

        // Initialize App
        window.onload = () => UI.init();

    </script>
</body>
